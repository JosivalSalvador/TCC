name: CI (Quality & Tests)

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ====================================================
  # 1. QUALITY & TESTS (TURBOREPO MESTRE: WEB + SERVER + IA)
  # ====================================================
  quality-check:
    name: Quality (Lint, Types, Tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ecommerce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d ecommerce_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup UV (Python)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create env files (Server)
        run: |
          echo "DATABASE_URL=postgresql://user:password@localhost:5432/ecommerce_test" > server/.env
          echo "JWT_SECRET=ci-secret" >> server/.env
          echo "NODE_ENV=test" >> server/.env
          cp server/.env server/.env.test

      - name: Install Node Dependencies
        run: npm ci --ignore-scripts --no-audit

      - name: Install IA Dependencies (uv sync)
        run: npm run install -w ia

      - name: Generate Prisma Client
        run: npm run db:gen
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/ecommerce_test

      - name: "Run Lint (Turbo Parallel: Web + Server + IA)"
        run: npm run lint

      - name: "Run Type Check (Turbo Parallel: Web + Server + IA)"
        run: npm run type-check

      - name: "Run Tests (Turbo Parallel: Web + Server + IA)"
        run: npm run test
        env:
          SKIP_ENV_VALIDATION: true

  # ====================================================
  # 2. E2E TESTS (DOCKER + PLAYWRIGHT) - RODA PARALELO COM BUILD
  # ====================================================
  e2e-tests:
    name: E2E Tests (Playwright & Docker)
    runs-on: ubuntu-latest
    needs: [quality-check]
    if: false
    
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit

      - name: Install Playwright Browsers
        working-directory: ./web
        run: npx playwright install --with-deps

      - name: Create .env.prod files for Docker Compose
        run: |
          echo "# Placeholder para o CI" > ia/.env.prod
          echo "PORT=3333" > server/.env.prod
          echo "DATABASE_URL=postgresql://user:pass@postgres:5432/db" >> server/.env.prod
          echo "JWT_SECRET=ci-secret" >> server/.env.prod
          echo "NODE_ENV=production" >> server/.env.prod

          echo "NEXT_PUBLIC_API_URL=http://localhost:3333" > web/.env.prod
          echo "API_INTERNAL_URL=http://api:3333" >> web/.env.prod

          echo "DATABASE_URL=postgresql://user:pass@localhost:5432/db" > server/.env
          echo "NODE_ENV=production" >> server/.env

      - name: Generate Prisma Client
        run: npm run db:gen

      - name: Run E2E Tests
        run: npm run test:e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  # ====================================================
  # 3. BUILD DE PRODUÇÃO (DOCKERFILES) - MATRIX PARALELA
  # ====================================================
  docker-build-check:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [quality-check]
    strategy:
      matrix:
        # Define os três projetos que serão buildados simultaneamente
        project: [server, web, ia]

    steps:
      - uses: actions/checkout@v6

      # Passo dinâmico: ele escolhe o comando certo baseado na matriz
      - name: Build image for ${{ matrix.project }}
        run: |
          if [ "${{ matrix.project }}" = "web" ]; then
            docker build \
              -f web/Dockerfile \
              --build-arg NEXT_PUBLIC_API_URL=http://localhost:3333 \
              --build-arg API_INTERNAL_URL=http://api:3333 \
              -t tcc-web:ci .
          elif [ "${{ matrix.project }}" = "ia" ]; then
            docker build -f ia/Dockerfile -t tcc-ia:ci ./ia
          else
            docker build -f server/Dockerfile -t tcc-server:ci .
          fi

  # ====================================================
  # 4. AUTO PR DEV → MAIN
  # ====================================================
  auto-pr:
    name: Open PR to Main
    runs-on: ubuntu-latest
    needs: [docker-build-check]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      - name: Check existing PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=$(gh pr list --base main --head dev --json id --jq '. | length')
          echo "exists=$([ "$count" -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Create PR
        if: steps.check_pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head dev \
            --title "Release: Merge dev to main" \
            --body "Automated PR after CI passed (tests + prod docker builds)."