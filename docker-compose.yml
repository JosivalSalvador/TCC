services:
  # ==========================================
  # 1. BANCO DE DADOS
  # ==========================================
  postgres:
    image: postgres:18-alpine
    container_name: tcc-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=db
    # Trava de segurança: expõe a porta apenas para a própria máquina (localhost do servidor)
    # Isso impede que hackers acessem seu banco pela internet pública
    ports:
      - "127.0.0.1:5432:5432" 
    volumes:
      - pgdata_prod:/var/lib/postgresql/data 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tcc-network

  # ==========================================
  # 2. SERVER (NODE + FASTIFY)
  # ==========================================
  server:
    # Puxa a imagem pronta que o GitHub Actions enviou pro Docker Hub
    image: josivaljunior/tcc-server:latest 
    container_name: tcc-server
    restart: unless-stopped
    depends_on:
      postgres: 
        condition: service_healthy
    env_file:
      - ./server/.env.prod
    ports:
      - "3333:3333"
    networks:
      - tcc-network

  # ==========================================
  # 3. IA (PYTHON + FASTAPI)
  # ==========================================
  ia:
    # Puxa a imagem pronta do Python
    image: josivaljunior/tcc-ia:latest 
    container_name: tcc-ia
    restart: unless-stopped
    env_file:
      - ./ia/.env.prod
    ports:
      - "8000:8000"
    networks:
      - tcc-network

  # ==========================================
  # 4. WEB (NEXT.JS)
  # ==========================================
  web:
    # Puxa a imagem pronta do Frontend
    image: josivaljunior/tcc-web:latest 
    container_name: tcc-web
    restart: unless-stopped
    depends_on:
      - server
    env_file:
      - ./web/.env.production
    ports:
      - "3000:3000"
    networks:
      - tcc-network

volumes:
  pgdata_prod:

networks:
  tcc-network:
    name: tcc-network
    driver: bridge